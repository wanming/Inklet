name: Build DMG

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to. Leave empty to use v<VERSION>-<BUILD_NUMBER>."
        required: false
        type: string
      release_name:
        description: "Release title. Leave empty to use Inklet <VERSION> (<BUILD_NUMBER>)."
        required: false
        type: string
      draft:
        description: "Create the release as a draft."
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build and publish DMG
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          source VERSION

          app_version="$INKLET_VERSION"
          build_number="$INKLET_BUILD_NUMBER"
          release_version="${app_version}-${build_number}"

          if [[ -n "${{ inputs.tag_name }}" ]]; then
            tag_name="${{ inputs.tag_name }}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_name="$GITHUB_REF_NAME"
          else
            tag_name="v${release_version}"
          fi

          if [[ -n "${{ inputs.release_name }}" ]]; then
            release_name="${{ inputs.release_name }}"
          else
            release_name="Inklet ${app_version} (${build_number})"
          fi

          asset_tag="${tag_name//\//-}"
          dmg_name="Inklet-${release_version}.dmg"

          {
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "asset_tag=$asset_tag"
            echo "app_version=$app_version"
            echo "build_number=$build_number"
            echo "release_version=$release_version"
            echo "dmg_name=$dmg_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        env:
          INKLET_BUILD_VERSION: ${{ steps.release.outputs.build_number }}
        run: swift build -c release

      - name: Run tests
        env:
          INKLET_BUILD_VERSION: ${{ steps.release.outputs.build_number }}
        run: swift test

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -k "$keychain_path" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db

          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$signing_identity" ]]; then
            echo "Developer ID Application signing identity was not found." >&2
            security find-identity -v -p codesigning "$keychain_path" >&2
            exit 1
          fi
          if [[ "$signing_identity" != *"($APPLE_TEAM_ID)"* ]]; then
            echo "Developer ID signing identity does not match APPLE_TEAM_ID." >&2
            echo "Found: $signing_identity" >&2
            exit 1
          fi

          {
            echo "APPLE_SIGNING_IDENTITY=$signing_identity"
            echo "APPLE_KEYCHAIN_PATH=$keychain_path"
          } >> "$GITHUB_ENV"

      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail

          app_name="Inklet"
          bundle_id="com.inklet.app"
          bin_path="$(swift build -c release --show-bin-path)"
          app_path="dist/${app_name}.app"

          rm -rf dist
          mkdir -p "$app_path/Contents/MacOS" "$app_path/Contents/Resources"

          cp "$bin_path/$app_name" "$app_path/Contents/MacOS/$app_name"
          chmod +x "$app_path/Contents/MacOS/$app_name"

          if [[ -d "$bin_path/Inklet_InkletCore.bundle" ]]; then
            cp -R "$bin_path/Inklet_InkletCore.bundle" "$app_path/Contents/Resources/Inklet_InkletCore.bundle"
          fi
          cp "Assets/AppIcon.icns" "$app_path/Contents/Resources/AppIcon.icns"

          cat > "$app_path/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>${app_name}</string>
            <key>CFBundleIdentifier</key>
            <string>${bundle_id}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>${app_name}</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.release.outputs.app_version }}</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.release.outputs.build_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSMicrophoneUsageDescription</key>
            <string>Inklet records short voice dictation when you use the voice shortcut.</string>
            <key>NSHumanReadableCopyright</key>
            <string>Copyright (c) 2026 Inklet contributors.</string>
          </dict>
          </plist>
          PLIST

          plutil -lint "$app_path/Contents/Info.plist"

      - name: Sign app bundle
        shell: bash
        run: |
          set -euo pipefail

          codesign \
            --force \
            --deep \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "dist/Inklet.app"
          codesign --verify --deep --strict --verbose=2 "dist/Inklet.app"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail

          dmg_root="dist/dmg-root"
          dmg_path="dist/${{ steps.release.outputs.dmg_name }}"

          mkdir -p "$dmg_root"
          cp -R "dist/Inklet.app" "$dmg_root/Inklet.app"
          ln -s /Applications "$dmg_root/Applications"

          hdiutil create \
            -volname "Inklet ${{ steps.release.outputs.app_version }} (${{ steps.release.outputs.build_number }})" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "$dmg_path"

          shasum -a 256 "$dmg_path" > "$dmg_path.sha256"
          cp "$dmg_path" "dist/Inklet.dmg"
          shasum -a 256 "dist/Inklet.dmg" > "dist/Inklet.dmg.sha256"

      - name: Sign and notarize DMG
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          private_key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          dmg_path="dist/${{ steps.release.outputs.dmg_name }}"

          printf '%s' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$private_key_path"
          chmod 600 "$private_key_path"

          codesign \
            --force \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$dmg_path"
          codesign --verify --verbose=2 "$dmg_path"

          xcrun notarytool submit "$dmg_path" \
            --key "$private_key_path" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vvv -t install "$dmg_path"

          shasum -a 256 "$dmg_path" > "$dmg_path.sha256"
          cp "$dmg_path" "dist/Inklet.dmg"
          shasum -a 256 "dist/Inklet.dmg" > "dist/Inklet.dmg.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          APP_VERSION: ${{ steps.release.outputs.app_version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build_number }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_NAME" \
              --latest \
              --draft="$DRAFT" \
              --prerelease="$PRERELEASE"
          else
            create_args=(
              release create "$TAG_NAME"
              --target "$GITHUB_SHA"
              --title "$RELEASE_NAME"
              --latest
              --notes "macOS DMG build ${APP_VERSION} (${BUILD_NUMBER}) from workflow run ${GITHUB_RUN_NUMBER}."
            )

            if [[ "$DRAFT" == "true" ]]; then
              create_args+=(--draft)
            fi
            if [[ "$PRERELEASE" == "true" ]]; then
              create_args+=(--prerelease)
            fi

            gh "${create_args[@]}"
          fi

          gh release upload "$TAG_NAME" dist/*.dmg dist/*.sha256 --clobber
